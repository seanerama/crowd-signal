name: CI
# Crowd-Signal — Verity gate.
# Stage 1 lands the progressive gate the scaffold promised: lint + typecheck +
# build + real tests on top of the original structure + secret-scan jobs.
#
# Secret scan note: the gitleaks-action range scan breaks when a push contains
# the root commit (`<root>^..HEAD` is an invalid range), so we run the pinned
# gitleaks binary directly over the FULL history (git mode, no range) — honest
# and green: exit 0 clean, non-zero (2 = leaks found) fails the job.
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required files present
        run: |
          for f in README.md LICENSE; do
            test -f "$f" || { echo "missing required file: $f"; exit 1; }
          done
          echo "structure ok"
  secret-scan:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.24.3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — gitleaks scans every commit
      - name: Install gitleaks (pinned)
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version
      - name: Scan full git history
        run: ./gitleaks detect --source . --redact --exit-code 2 -v
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
